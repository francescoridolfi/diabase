{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Diabase{% endblock %}</title>
<link rel="stylesheet" href="{% static 'web/diabase.css' %}">
</head>
<body>
<header class="top">
  <a href="{% url 'home' %}" class="logo">◆ dia<em>base</em></a>
  <nav style="display:flex; gap:1rem; font-size:0.85rem; color:var(--dim)">
    <a href="{% url 'home' %}">projects</a>
    <a href="{% url 'connections' %}">connections</a>
  </nav>
  <div>
    {% if agent.ok %}<span class="pill ok">agent: {{ agent.backend }}</span>
    {% else %}<span class="pill err" title="{{ agent.reason }}">agent unavailable</span>{% endif %}
  </div>
</header>
<main>{% block content %}{% endblock %}</main>
{% block scripts %}{% endblock %}
</body>
</html>
