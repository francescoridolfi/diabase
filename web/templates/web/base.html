{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Diabase{% endblock %}</title>
<link rel="stylesheet" href="{% static 'web/diabase.css' %}">
</head>
<body class="{% block bodyclass %}{% endblock %}">
<div class="app-shell" id="app-shell">
  <nav class="sidebar" id="sidebar" aria-label="Navigation">
    <a class="side-head" href="{% url 'home' %}">◆ dia<em>base</em></a>
    {% block sidebar %}
    <div class="side-nav">{% include "web/_nav.html" %}</div>
    {% endblock %}
  </nav>
  <main class="app-main">
    {% block burger %}<button class="burger page-burger" id="burger" aria-label="Menu">☰</button>{% endblock %}
    {% block content %}{% endblock %}
  </main>
</div>
<script type="module" src="{% static 'web/shell.js' %}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
