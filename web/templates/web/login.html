{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Diabase</title>
<link rel="stylesheet" href="{% static 'web/diabase.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="orb" style="width:64px;height:64px;--ring:3px;cursor:default">
    <div class="ring r2"></div><div class="ring r3"></div>
  </div>
  <div class="auth-logo">◆ dia<em>base</em></div>
  <div class="card auth-card">
    <h2>Sign in</h2>
    {% if form.errors %}<p class="auth-error">Wrong username or password.</p>{% endif %}
    <form method="post" class="stack">{% csrf_token %}
      <label class="lbl" for="id_username">Username</label>
      <input name="username" id="id_username" autofocus autocapitalize="none" autocomplete="username" required>
      <label class="lbl" for="id_password">Password</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password" required>
      <input type="hidden" name="next" value="{{ next }}">
      <button>Sign in</button>
    </form>
  </div>
  <p class="muted auth-hint">Fresh instance? The bootstrap credential is <code>admin</code> / <code>admin</code> — you'll be asked to change it right away.</p>
</div>
</body>
</html>
